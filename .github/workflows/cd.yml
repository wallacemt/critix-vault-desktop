name: CD Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Versao sem o prefixo v (ex: 1.2.0)"
                required: true
                type: string
            release_name:
                description: "Nome da release (ex: Critix Vault 1.2.0)"
                required: true
                type: string
            release_description:
                description: "Descricao/changelog da release"
                required: true
                type: string
            prerelease:
                description: "Marcar como pre-release"
                required: true
                default: false
                type: boolean
            draft:
                description: "Criar como draft"
                required: true
                default: false
                type: boolean

permissions:
    contents: write

concurrency:
    group: release-${{ inputs.version }}
    cancel-in-progress: false

jobs:
    prepare:
        name: Validate and Create Release
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.meta.outputs.tag }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Validate version and create release
              id: meta
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE_DESCRIPTION: ${{ inputs.release_description }}
              run: |
                  version="${{ inputs.version }}"
                  version="${version// /}"
                  if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
                    echo "::error::Invalid version format. Use semantic version format like 1.2.0"
                    exit 1
                  fi
                  TAG="v$version"
                  echo "tag=$TAG" >> $GITHUB_OUTPUT

                  printf '%s\n\n---\nVersion: %s\nCommit: %s\n' \
                    "$RELEASE_DESCRIPTION" "$TAG" "${{ github.sha }}" > /tmp/notes.md

                  EXTRA=""
                  [ "${{ inputs.draft }}" = "true" ] && EXTRA="$EXTRA --draft"
                  [ "${{ inputs.prerelease }}" = "true" ] && EXTRA="$EXTRA --prerelease"

                  gh release create "$TAG" \
                    --repo "${{ github.repository }}" \
                    --title "${{ inputs.release_name }}" \
                    --notes-file /tmp/notes.md \
                    --generate-notes \
                    $EXTRA

    build:
        name: Build - ${{ matrix.label }}
        needs: prepare
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: windows-latest
                      label: Windows
                      bundles: nsis,msi

                    - platform: ubuntu-22.04
                      label: Linux
                      bundles: appimage,deb

                    - platform: macos-latest
                      label: macOS
                      bundles: dmg

        runs-on: ${{ matrix.platform }}
        timeout-minutes: 70

        env:
            CI: true
            BACKEND_URL: ${{ secrets['BACKEND_URL'] }}
            NEXT_PUBLIC_CRITIX_API_URL: ${{ secrets['BACKEND_URL'] }}
            CRITIX_EXTERNAL_API_URL: ${{ secrets['BACKEND_URL'] }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Validate required secret
              shell: bash
              run: |
                  if [ -z "$BACKEND_URL" ]; then
                    echo "::error::BACKEND_URL secret is required for release pipeline."
                    exit 1
                  fi

            - name: Install Linux build dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma client
              run: bunx prisma generate

            - name: Build desktop app (Tauri)
              run: bun run tauri:build -- --bundles ${{ matrix.bundles }}

            - name: Upload artifacts to GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: bash
              run: |
                  TAG="${{ needs.prepare.outputs.tag }}"
                  BUNDLE_DIR="src-tauri/target/release/bundle"
                  UPLOADED=0

                  for file in \
                    "$BUNDLE_DIR"/nsis/*.exe \
                    "$BUNDLE_DIR"/msi/*.msi \
                    "$BUNDLE_DIR"/appimage/*.AppImage \
                    "$BUNDLE_DIR"/deb/*.deb \
                    "$BUNDLE_DIR"/dmg/*.dmg; do
                    if [ -f "$file" ]; then
                      echo "Uploading: $file"
                      gh release upload "$TAG" "$file" \
                        --repo "${{ github.repository }}" \
                        --clobber
                      UPLOADED=$((UPLOADED + 1))
                    fi
                  done

                  if [ "$UPLOADED" -eq 0 ]; then
                    echo "::warning::No release artifacts found for ${{ matrix.label }}"
                  else
                    echo "Uploaded $UPLOADED artifact(s) for ${{ matrix.label }}"
                  fi
