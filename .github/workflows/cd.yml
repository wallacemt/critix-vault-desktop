name: CD Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Versao sem o prefixo v (ex: 1.2.0)"
                required: true
                type: string
            release_name:
                description: "Nome da release (ex: Critix Vault 1.2.0)"
                required: true
                type: string
            release_description:
                description: "Descricao/changelog da release"
                required: true
                type: string
            prerelease:
                description: "Marcar como pre-release"
                required: true
                default: false
                type: boolean
            draft:
                description: "Criar como draft"
                required: true
                default: false
                type: boolean

permissions:
    contents: write

concurrency:
    group: release-${{ inputs.version }}
    cancel-in-progress: false

jobs:
    release:
        name: Build and Publish Release
        runs-on: windows-latest
        timeout-minutes: 70

        env:
            CI: true
            BACKEND_URL: ${{ secrets['BACKEND_URL'] }}
            NEXT_PUBLIC_CRITIX_API_URL: ${{ secrets['BACKEND_URL'] }}
            CRITIX_EXTERNAL_API_URL: ${{ secrets['BACKEND_URL'] }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Validate required secret
              shell: pwsh
              run: |
                  if ([string]::IsNullOrWhiteSpace("$env:BACKEND_URL")) {
                    Write-Error "BACKEND_URL secret is required for release pipeline."
                    exit 1
                  }

            - name: Prepare release metadata
              id: meta
              shell: pwsh
              run: |
                  $version = "${{ inputs.version }}".Trim()
                  if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$') {
                    Write-Error "Invalid version format. Use semantic version format like 1.2.0"
                    exit 1
                  }
                  "tag=v$version" >> $env:GITHUB_OUTPUT

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build desktop app (Tauri)
              run: bun run tauri:build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: critix-vault-${{ steps.meta.outputs.tag }}
                  path: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/**/*.AppImage
                      src-tauri/target/release/bundle/**/*.deb
                  if-no-files-found: warn

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.meta.outputs.tag }}
                  name: ${{ inputs.release_name }}
                  body: |
                      ${{ inputs.release_description }}

                      ---
                      Version: ${{ steps.meta.outputs.tag }}
                      Commit: ${{ github.sha }}
                  draft: ${{ inputs.draft }}
                  prerelease: ${{ inputs.prerelease }}
                  generate_release_notes: true
                  fail_on_unmatched_files: false
                  files: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/**/*.AppImage
                      src-tauri/target/release/bundle/**/*.deb
