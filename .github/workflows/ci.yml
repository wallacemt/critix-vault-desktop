name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    lint-and-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Lint (eslint)
              run: bun run lint || bunx eslint .

            - name: Type check (tsc)
              run: bun run typecheck || bunx tsc --noEmit

            - name: Check formatting (prettier)
              run: bun run format:check || bunx prettier --check .

            - name: Check Rust (cargo check)
              run: |
                  cd src-tauri
                  cargo check
