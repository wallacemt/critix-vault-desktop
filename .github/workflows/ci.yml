name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Build and Rust Check
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: next-cache-${{ runner.os }}-${{ hashFiles('**/bun.lock*', '**/package.json', '**/tsconfig.json', 'next.config.mjs') }}
          restore-keys: |
            next-cache-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

  
      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build web app
        run: bun run build

      - name: Cargo check (Tauri)
        working-directory: src-tauri
        run: cargo check
