name: Sign Artifacts

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Nome do artifact a assinar (ex: critix-vault-v1.2.0)"
        required: true
        type: string
      signing_method:
        description: "Método de assinatura"
        required: true
        type: choice
        options:
          - sigstore
          - self-signed
        default: sigstore

permissions:
  contents: read
  id-token: write

jobs:
  sign:
    name: Sign Build Artifacts
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts

      - name: List artifacts
        shell: pwsh
        run: |
          Write-Host "Artifacts:"
          Get-ChildItem -Path "artifacts" -Recurse

      - name: Create output dir
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "signed-artifacts" | Out-Null

      # ----------------------------
      # SIGSTORE
      # ----------------------------
      - name: Sign with Sigstore
        if: inputs.signing_method == 'sigstore'
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: artifacts/**
          upload-signing-artifacts: false

      # ----------------------------
      # SELF-SIGNED
      # ----------------------------
      - name: Create self-signed certificate
        if: inputs.signing_method == 'self-signed'
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Subject "CN=Critix Vault" `
            -KeyUsage DigitalSignature `
            -Type CodeSigningCert `
            -NotAfter (Get-Date).AddYears(5)

          Export-PfxCertificate `
            -Cert $cert `
            -FilePath "cert.pfx" `
            -Password (ConvertTo-SecureString "${{ secrets.CERT_PASSWORD }}" -AsPlainText -Force)

      - name: Sign binaries with signtool
        if: inputs.signing_method == 'self-signed'
        shell: pwsh
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue)

          if (-not $signtool) {
            throw "signtool não encontrado no PATH"
          }

          $files = Get-ChildItem -Path "artifacts" -Recurse -Include *.exe, *.msi

          foreach ($file in $files) {
            Write-Host "Signing $($file.FullName)"

            & signtool sign `
              /f cert.pfx `
              /p "${{ secrets.CERT_PASSWORD }}" `
              /fd sha256 `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              "$($file.FullName)"

            if ($LASTEXITCODE -ne 0) {
              throw "Erro ao assinar $($file.Name)"
            }
          }

      - name: Copy artifacts preserving structure
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "artifacts" -Recurse -File

          foreach ($file in $files) {
            $relative = $file.FullName.Substring((Resolve-Path "artifacts").Path.Length + 1)
            $dest = Join-Path "signed-artifacts" $relative

            New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
            Copy-Item $file.FullName $dest -Force
          }

      # ----------------------------
      # CHECKSUMS
      # ----------------------------
      - name: Generate SHA256
        shell: pwsh
        run: |
          $out = @()

          Get-ChildItem -Path "signed-artifacts" -Recurse -File | ForEach-Object {
            if ($_.Name -notin @("SHA256SUMS", "SIGNING_REPORT.md")) {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
              $rel = $_.FullName.Substring((Resolve-Path "signed-artifacts").Path.Length + 1)
              $out += "$hash  $rel"
            }
          }

          $out | Out-File "signed-artifacts/SHA256SUMS" -Encoding UTF8

      # ----------------------------
      # REPORT
      # ----------------------------
      - name: Generate signing report
        shell: pwsh
        run: |
          $method = "${{ inputs.signing_method }}"
          $artifact = "${{ inputs.artifact_name }}"
          $date = Get-Date -Format "yyyy-MM-dd HH:mm:ss"

          $report = @"
            # Signing Report

            **Date:** $date  
            **Method:** $method  
            **Artifact:** $artifact  

            ## Files

            "@

          Get-ChildItem -Path "signed-artifacts" -Recurse -File | ForEach-Object {
            if ($_.Name -notin @("SHA256SUMS", "SIGNING_REPORT.md")) {
              $report += "- $($_.Name)`n"
            }
          }

          if ($method -eq "sigstore") {
            $report += @"
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-${{ inputs.artifact_name }}
          path: signed-artifacts