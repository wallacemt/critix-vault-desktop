name: Tauri Updater Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex: v1.2.0)"
        required: true
        type: string
      prerelease:
        description: "Publicar como pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: updater-release-${{ github.ref_name }}${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve metadata
        id: meta
        run: |
          tag="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            tag="${tag// /}"
          fi

          if ! echo "$tag" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid tag format. Use vX.Y.Z (example: v1.2.0)."
            exit 1
          fi

          isPrerelease="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.prerelease }}" = "true" ]; then
            isPrerelease="true"
          fi

          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "prerelease=$isPrerelease" >> $GITHUB_OUTPUT

  build:
    name: Build and sign - ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
            bundles: nsis,msi

          - platform: ubuntu-22.04
            label: Linux
            bundles: appimage

          - platform: macos-latest
            label: macOS
            bundles: dmg

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    env:
      CI: true
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      NEXT_PUBLIC_CRITIX_API_URL: ${{ secrets.BACKEND_URL }}
      CRITIX_EXTERNAL_API_URL: ${{ secrets.BACKEND_URL }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL secret is required."
            exit 1
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for updater artifact signing."
            exit 1
          fi

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Enable updater artifacts
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.bundle = cfg.bundle || {};
            cfg.bundle.createUpdaterArtifacts = true;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "

      - name: Build desktop app with updater artifacts
        run: bun run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Collect updater manifest
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          MANIFEST=$(find "$BUNDLE_DIR" -name "latest.json" | head -1)
          if [ -z "$MANIFEST" ]; then
            echo "::error::latest.json not generated. Ensure createUpdaterArtifacts=true and signing secrets are valid."
            exit 1
          fi

          SIGS=$(find "$BUNDLE_DIR" -name "*.sig" | wc -l)
          if [ "$SIGS" -lt 1 ]; then
            echo "::error::No updater signature files (*.sig) found."
            exit 1
          fi

          cp "$MANIFEST" "latest-${{ matrix.label }}.json"
          echo "Resolved latest.json from: $MANIFEST"
          cat "latest-${{ matrix.label }}.json"

      - name: Upload updater manifest
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest-${{ matrix.label }}
          path: latest-${{ matrix.label }}.json
          if-no-files-found: error

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-artifacts-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg.sig
          if-no-files-found: warn

  publish:
    name: Merge manifests and publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all updater manifests
        uses: actions/download-artifact@v4
        with:
          pattern: updater-manifest-*
          path: manifests

      - name: Merge latest.json manifests
        run: |
          python3 << 'EOF'
          import json, glob, sys

          merged = None
          for f in sorted(glob.glob('manifests/updater-manifest-*/latest-*.json')):
              print(f"Processing: {f}", flush=True)
              with open(f) as fp:
                  data = json.load(fp)
              if merged is None:
                  merged = dict(data)
                  merged.setdefault('platforms', {})
              merged['platforms'].update(data.get('platforms', {}))

          if merged is None:
              print("::error::No latest.json manifests found to merge", flush=True)
              sys.exit(1)

          with open('latest.json', 'w') as fp:
              json.dump(merged, fp, indent=2)
              fp.write('\n')

          print("Merged latest.json:", flush=True)
          print(json.dumps(merged, indent=2), flush=True)
          EOF

      - name: Download all signed artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Critix Vault ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            latest.json
            release-artifacts/**
